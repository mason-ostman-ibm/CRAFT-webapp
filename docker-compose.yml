version: '3.8'

services:
  # Frontend Development Server (Vite)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
    environment:
      - NODE_ENV=development
    command: npm run dev
    networks:
      - app-network

  # Backend API Server (Node.js/Express)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app/api
      - ./uploads:/app/uploads
      - ./.env:/app/.env
    environment:
      - NODE_ENV=development
      - PORT=3000
      # Python microservice URL - points to deployed Code Engine service
      - PYTHON_SERVICE_URL=https://craft-python-service.24t5y2wfmvmo.us-east.codeengine.appdomain.cloud
    env_file:
      - .env
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  node_modules: