kind: Deployment
apiVersion: apps/v1
metadata:
  name: excel-ai-processor
  namespace: content-studio-platform
  labels:
    app: excel-ai-processor
    app.kubernetes.io/name: excel-ai-processor
    app.kubernetes.io/component: web-application
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: excel-ai-processor
  template:
    metadata:
      labels:
        app: excel-ai-processor
        app.kubernetes.io/name: excel-ai-processor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      # Security context for the pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      
      containers:
        # Backend API Server Container (Express.js + serves frontend)
        - name: backend
          image: 'image-registry.openshift-image-registry.svc:5000/content-studio-platform/excel-ai-processor:latest'
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          env:
            - name: PORT
              value: '3000'
            - name: NODE_ENV
              value: 'production'
            - name: PYTHON_SERVICE_URL
              value: 'https://craft-python-service.24t5y2wfmvmo.us-east.codeengine.appdomain.cloud'
            - name: INSTANA_REPORTING_URL
              value: 'https://ibmdevsandbox-instanaibm.instana.io'
            - name: INSTANA_AGENT_KEY
              valueFrom:
                secretKeyRef:
                  name: instana-secrets
                  key: agent-key
                  optional: true
            - name: WATSONX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: watsonx-secrets
                  key: api-key
            - name: WATSONX_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: watsonx-secrets
                  key: project-id
            - name: ASTRA_DB_API_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: astra-secrets
                  key: api-endpoint
                  optional: true
            - name: ASTRA_DB_APPLICATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: astra-secrets
                  key: application-token
                  optional: true
          envFrom:
            - configMapRef:
                name: excel-ai-processor-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
        
        # OAuth2 Proxy Container
        - name: oauth2-proxy
          image: 'quay.io/oauth2-proxy/oauth2-proxy:v7.6.0'
          ports:
            - containerPort: 4180
              protocol: TCP
              name: oauth
          envFrom:
            - secretRef:
                name: excel-ai-processor-secrets
          args:
            - '--provider=oidc'
            - '--oidc-issuer-url=https://login.w3.ibm.com/oidc/endpoint/default'
            - '--scope=openid email profile'
            - '--upstream=http://localhost:3000'
            - '--http-address=0.0.0.0:4180'
            - '--redirect-url=https://excel-ai-processor-np.dinero.techzone.ibm.com/oauth2/callback'
            - '--set-authorization-header=true'
            - '--pass-access-token=true'
            - '--set-xauthrequest=true'
            - '--email-domain=*'
            - '--skip-provider-button=true'
            - '--skip-auth-regex=^/api/health'
            - '--cookie-secure=true'
            - '--cookie-httponly=true'
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      
      volumes:
        - name: uploads
          emptyDir: {}
      
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
      
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600

